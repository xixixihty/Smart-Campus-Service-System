server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB




  datasource:
    username: root
    password: 1234
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/smart_campus?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis ??
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Spring AI ???
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-max
        completions-path: /v1/chat/completions



  # Redisson配置
  redisson:
    config:
      singleServerConfig:
        address: "redis://localhost:6379"
        database: 0
        connectionPoolSize: 64
        connectionMinimumIdleSize: 16
        idleConnectionTimeout: 10000
        connectTimeout: 10000
        timeout: 3000
        retryAttempts: 3
        retryInterval: 1000
      lock:
        leaseTime: 30000
        waitTime: 3000




  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 10
        max-concurrency: 50

  # Sentinel配置
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8080


# 阿里云OSS配置
aliyun:
  oss:
    endpoint: ${endpoint}
    access-key-id: ${access-key-id}
    access-key-secret: ${access-key-secret}
    bucket-name: ${bucket-name}

# MyBatis ??
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hxq.smart_campus.entity
  configuration:
    map-underscore-to-camel-case: true    # ??????
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # ????? SQL

# springdoc-openapi ???Swagger UI?
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: ???????? API
    description: ????????????AI ???????
    version: 1.0.0

# ????????
logging:
  level:
    com.hxq.smart_campus: debug
    org.springframework.web: info

# 智慧校园业务配置
smartcampus:
  rabbitmq:
    enabled: true


