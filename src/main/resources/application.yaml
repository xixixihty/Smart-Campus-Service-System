server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # ??????MySQL?
  datasource:
    username: root
    password: 1234
    url: jdbc:mysql://localhost:3306/smart_campus?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # Redis ??
  data:
    redis:
      host: localhost
      port: 6379
      password:              # ????????
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Spring AI ???Ollama ?????
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: deepseek-r1:1.5b     # ????????????
        temperature: 0.7
      embedding:
        enabled: false
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1  # ??????OpenAI????
      chat:
        options:
          model: qwen-max

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: https://oss-cn-hangzhou.aliyuncs.com
    access-key-id: REDACTED_ACCESS_KEY_ID
    access-key-secret: REDACTED_ACCESS_KEY_SECRET
    bucket-name: hexiongqi

# MyBatis ??
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hxq.smart_campus.entity
  configuration:
    map-underscore-to-camel-case: true    # ??????
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # ????? SQL

# springdoc-openapi ???Swagger UI?
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  info:
    title: ???????? API
    description: ????????????AI ???????
    version: 1.0.0

# ????????
logging:
  level:
    com.hxq.smart_campus: debug
    org.springframework.web: info


